<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Marathon Adaptatif — Voies Royales 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;1,9..144,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0e0e0c; --surface:#161614; --surface2:#1e1e1b; --surface3:#252522;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.12); --border3:rgba(255,255,255,0.2);
  --text:#e8e6df; --text2:#908e85; --text3:#504e48;
  --teal:#1D9E75; --teal-light:#4ABFA0; --teal-dim:rgba(29,158,117,0.12);
  --blue:#378ADD; --blue-light:#6AAEE8; --blue-dim:rgba(55,138,221,0.12);
  --purple:#7F77DD; --purple-dim:rgba(127,119,221,0.12);
  --amber:#EF9F27; --amber-light:#F5BC65; --amber-dim:rgba(239,159,39,0.12);
  --red:#E24B4A; --red-dim:rgba(226,75,74,0.12);
  --green:#1D9E75; --green-dim:rgba(29,158,117,0.12);
  --font-display:'Fraunces',Georgia,serif; --font-mono:'DM Mono','Courier New',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font-mono);font-size:13px;line-height:1.6;min-height:100vh;}

/* HEADER */
.header{padding:1.5rem 2.5rem 1.2rem;border-bottom:1px solid var(--border);display:flex;align-items:flex-end;justify-content:space-between;gap:2rem;flex-wrap:wrap;}
.header-left h1{font-family:var(--font-display);font-weight:300;font-size:2rem;line-height:1.1;letter-spacing:-0.02em;}
.header-left h1 em{font-style:italic;color:var(--teal-light);}
.header-left p{color:var(--text2);font-size:11px;letter-spacing:.1em;text-transform:uppercase;margin-top:.3rem;}
.header-right{display:flex;gap:1.2rem;align-items:flex-end;flex-wrap:wrap;}
.hstat{text-align:right;}
.hstat-val{font-family:var(--font-display);font-weight:300;font-size:1.5rem;line-height:1;}
.hstat-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-top:2px;}
.countdown{background:var(--teal-dim);border:1px solid rgba(29,158,117,0.3);border-radius:6px;padding:8px 14px;text-align:center;}
.countdown-val{font-family:var(--font-display);font-size:1.8rem;font-weight:300;color:var(--teal-light);line-height:1;}
.countdown-label{font-size:10px;color:var(--teal);text-transform:uppercase;letter-spacing:.1em;}

/* FORME INDICATOR */
.forme-bar{padding:.6rem 2.5rem;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap;}
.forme-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;}
.forme-dots{display:flex;gap:6px;}
.forme-dot{width:28px;height:6px;border-radius:3px;background:var(--surface3);}
.forme-dot.active-teal{background:var(--teal);}
.forme-dot.active-amber{background:var(--amber);}
.forme-dot.active-red{background:var(--red);}
.forme-text{font-size:11px;color:var(--text2);}
.forme-sep{width:1px;height:16px;background:var(--border);}
.progression-text{font-size:11px;color:var(--text2);}
.progression-text strong{color:var(--teal-light);}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);padding:0 2.5rem;}
.tab{padding:11px 18px;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;font-family:var(--font-mono);background:none;border-top:none;border-left:none;border-right:none;}
.tab:hover{color:var(--text2);}
.tab.active{color:var(--text);border-bottom-color:var(--teal);}
.tab-badge{display:inline-block;background:var(--red);color:#fff;font-size:9px;padding:1px 5px;border-radius:8px;margin-left:5px;vertical-align:middle;}

/* LAYOUT */
.main{display:flex;min-height:calc(100vh - 160px);}
.sidebar{width:220px;flex-shrink:0;border-right:1px solid var(--border);padding:1.5rem 0;}
.content{flex:1;padding:1.5rem 2rem;overflow-x:hidden;}
.panel{display:none;}
.panel.active{display:block;}

/* SIDEBAR */
.sidebar-heading{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);padding:0 1.2rem;margin-bottom:.5rem;}
.sidebar-section{margin-bottom:1.5rem;}
.phase-item{display:flex;align-items:center;gap:10px;padding:8px 1.2rem;cursor:pointer;transition:background .15s;border-left:2px solid transparent;}
.phase-item:hover{background:var(--surface2);}
.phase-item.active{background:var(--surface2);border-left-color:var(--phase-color);}
.phase-dot{width:8px;height:8px;border-radius:50%;background:var(--phase-color);flex-shrink:0;}
.phase-name{font-size:11px;color:var(--text2);}
.phase-item.active .phase-name{color:var(--text);}
.phase-weeks{font-size:10px;color:var(--text3);}
.week-list{max-height:420px;overflow-y:auto;scrollbar-width:none;}
.week-list::-webkit-scrollbar{display:none;}
.week-item{display:flex;align-items:center;gap:8px;padding:6px 1.2rem;cursor:pointer;transition:background .15s;border-left:2px solid transparent;}
.week-item:hover{background:var(--surface2);}
.week-item.active{background:var(--surface2);border-left-color:var(--phase-color,var(--teal));}
.week-num-label{font-size:10px;color:var(--text3);min-width:22px;}
.week-item-title{font-size:11px;color:var(--text2);flex:1;}
.week-item.active .week-item-title{color:var(--text);}
.week-status-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.week-highlight-dot{width:5px;height:5px;border-radius:50%;background:var(--amber);flex-shrink:0;}

/* SECTION TITLE */
.section-title{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:1rem;padding-bottom:6px;border-bottom:1px solid var(--border);}

/* OVERVIEW PANEL */
.overview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:1.5rem;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1rem 1.1rem;}
.stat-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;}
.stat-val{font-family:var(--font-display);font-size:1.5rem;font-weight:300;}
.stat-sub{font-size:11px;color:var(--text2);margin-top:2px;}

.insight-box{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1rem 1.2rem;margin-bottom:1rem;}
.insight-title{font-size:11px;color:var(--text2);margin-bottom:.4rem;font-weight:500;}
.insight-text{font-size:12px;color:var(--text3);line-height:1.6;}
.insight-box.warn{border-color:rgba(239,159,39,0.3);background:var(--amber-dim);}
.insight-box.ok{border-color:rgba(29,158,117,0.3);background:var(--teal-dim);}
.insight-box.alert{border-color:rgba(226,75,74,0.3);background:var(--red-dim);}

/* WEEK DETAIL + LOG */
.week-header-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px;}
.week-title-display{font-family:var(--font-display);font-size:1.4rem;font-weight:300;}
.week-vol-display{font-family:var(--font-display);font-size:1.8rem;font-weight:300;}
.vol-bar-outer{height:3px;background:var(--surface3);border-radius:2px;margin-bottom:1.5rem;}
.vol-bar-inner{height:3px;border-radius:2px;transition:width .5s;}

.sessions-list{display:flex;flex-direction:column;gap:10px;}
.session-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1rem 1.2rem;position:relative;overflow:hidden;transition:border-color .2s;}
.session-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--s-color);}
.session-card:hover{border-color:var(--border2);}
.session-card.done{opacity:.75;}
.session-card.done::after{content:'✓';position:absolute;top:10px;right:14px;font-size:16px;color:var(--teal);font-weight:300;}
.session-card.skipped::after{content:'—';position:absolute;top:10px;right:14px;font-size:16px;color:var(--text3);}
.session-card.adjusted{border-color:rgba(239,159,39,0.4);}
.session-top{display:flex;gap:1.2rem;align-items:flex-start;}
.session-day-badge{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);min-width:28px;padding-top:2px;}
.session-body{flex:1;}
.session-name{font-size:13px;color:var(--text);margin-bottom:5px;}
.session-type-badge{display:inline-block;font-size:9px;padding:2px 8px;border-radius:10px;letter-spacing:.06em;text-transform:uppercase;margin-bottom:7px;}
.session-details{display:flex;flex-wrap:wrap;gap:7px;}
.sdet{background:var(--surface2);border-radius:4px;padding:3px 8px;font-size:11px;}
.sdet-label{color:var(--text3);}
.sdet-val{color:var(--text2);}
.session-dist-badge{font-family:var(--font-display);font-size:1.3rem;font-weight:300;color:var(--text2);min-width:48px;text-align:right;padding-top:2px;}
.session-dist-badge span{font-size:10px;color:var(--text3);}
.session-note{margin-top:6px;font-size:11px;color:var(--text3);font-style:italic;}

/* LOG FORM */
.log-toggle{margin-top:10px;display:flex;gap:8px;align-items:center;}
.btn-log{padding:5px 12px;font-size:11px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-family:var(--font-mono);transition:all .15s;}
.btn-log:hover{background:var(--surface2);color:var(--text);}
.btn-log.done-btn{border-color:rgba(29,158,117,0.4);color:var(--teal);}
.btn-log.skip-btn{border-color:var(--border);color:var(--text3);}
.btn-log.edit-btn{border-color:rgba(239,159,39,0.3);color:var(--amber);}

.log-form{margin-top:10px;background:var(--surface2);border-radius:8px;padding:12px 14px;display:none;}
.log-form.open{display:block;}
.log-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;}
.log-field{display:flex;flex-direction:column;gap:4px;flex:1;min-width:100px;}
.log-field label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;}
.log-field input,.log-field select,.log-field textarea{background:var(--surface3);border:1px solid var(--border2);border-radius:4px;padding:5px 8px;color:var(--text);font-family:var(--font-mono);font-size:12px;outline:none;}
.log-field input:focus,.log-field select:focus,.log-field textarea:focus{border-color:var(--teal);}
.log-field textarea{resize:vertical;min-height:50px;}
.ressenti-row{display:flex;gap:6px;margin-bottom:10px;}
.ressenti-btn{flex:1;padding:6px 4px;border:1px solid var(--border);background:transparent;border-radius:6px;font-size:11px;color:var(--text3);cursor:pointer;font-family:var(--font-mono);transition:all .15s;text-align:center;}
.ressenti-btn:hover{background:var(--surface3);}
.ressenti-btn.selected-1{border-color:var(--red);color:var(--red);background:var(--red-dim);}
.ressenti-btn.selected-2{border-color:var(--amber);color:var(--amber);background:var(--amber-dim);}
.ressenti-btn.selected-3{border-color:var(--teal);color:var(--teal);background:var(--teal-dim);}
.ressenti-btn.selected-4{border-color:var(--blue);color:var(--blue);background:var(--blue-dim);}
.ressenti-btn.selected-5{border-color:var(--purple);color:var(--purple);background:var(--purple-dim);}
.log-actions{display:flex;gap:8px;}
.btn-save{padding:6px 16px;background:var(--teal);color:#fff;border:none;border-radius:6px;font-size:12px;font-family:var(--font-mono);cursor:pointer;}
.btn-save:hover{background:var(--teal-light);}
.btn-cancel{padding:6px 12px;background:transparent;color:var(--text3);border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:var(--font-mono);cursor:pointer;}

/* LOGGED RESULT */
.log-result{margin-top:10px;background:var(--surface2);border-radius:6px;padding:8px 12px;border-left:2px solid var(--teal);}
.log-result.skipped-result{border-left-color:var(--text3);}
.log-result-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:4px;}
.log-res-item{font-size:11px;}
.log-res-label{color:var(--text3);}
.log-res-val{color:var(--text2);}
.log-res-comment{font-size:11px;color:var(--text3);font-style:italic;margin-top:2px;}
.delta-badge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:10px;margin-left:6px;}
.delta-pos{background:var(--teal-dim);color:var(--teal);}
.delta-neg{background:var(--red-dim);color:var(--red);}

/* ADAPTATION BANNER */
.adapt-banner{background:var(--amber-dim);border:1px solid rgba(239,159,39,0.35);border-radius:8px;padding:12px 16px;margin-bottom:1.2rem;display:flex;gap:12px;align-items:flex-start;}
.adapt-icon{font-size:16px;flex-shrink:0;margin-top:1px;}
.adapt-text{font-size:12px;color:var(--amber-light);line-height:1.6;}
.adapt-text strong{color:var(--amber);}

/* ZONES */
.zones-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:2rem;}
.zone-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1rem 1.2rem;position:relative;overflow:hidden;}
.zone-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--zone-color);}
.zone-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:.4rem;}
.zone-name{font-family:var(--font-display);font-size:1.05rem;font-weight:300;color:var(--text);margin-bottom:.3rem;}
.zone-pace{font-size:1.3rem;font-family:var(--font-display);font-weight:300;color:var(--zone-color);line-height:1;}
.zone-hr{font-size:11px;color:var(--text2);margin-top:3px;}
.zone-desc{font-size:11px;color:var(--text3);margin-top:7px;line-height:1.5;}
.zone-badges{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px;}
.zbadge{font-size:9px;padding:2px 7px;border-radius:10px;background:rgba(255,255,255,0.05);color:var(--text3);}

/* TARGET BAR */
.marathon-target{background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:1.2rem 1.5rem;margin-bottom:2rem;display:flex;gap:2rem;align-items:center;flex-wrap:wrap;}
.target-item .tlabel{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px;}
.target-item .tval{font-family:var(--font-display);font-size:1.5rem;font-weight:300;color:var(--teal-light);}
.target-item .tsub{font-size:11px;color:var(--text2);}
.tdivider{width:1px;height:40px;background:var(--border);}

/* TIMELINE */
.timeline-wrap{overflow-x:auto;padding-bottom:1rem;}

/* PHASE DETAIL */
.phase-desc-box{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1rem 1.2rem;margin-bottom:1.2rem;color:var(--text2);font-size:12px;line-height:1.7;}
.phase-stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.2rem;}
.phase-stat{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.9rem 1.1rem;}
.phase-stat-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px;}
.phase-stat-val{font-family:var(--font-display);font-size:1.3rem;font-weight:300;}
.focus-item{display:flex;gap:8px;padding:3px 0;font-size:11px;color:var(--text2);}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.session-card{animation:fadeUp .2s ease both;}
.session-card:nth-child(1){animation-delay:.02s;}
.session-card:nth-child(2){animation-delay:.05s;}
.session-card:nth-child(3){animation-delay:.08s;}
.session-card:nth-child(4){animation-delay:.11s;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;display:flex;align-items:center;justify-content:center;padding:2rem;}
.modal-overlay.hidden{display:none;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:1.5rem 2rem;max-width:420px;width:100%;}
.modal h3{font-family:var(--font-display);font-weight:300;font-size:1.3rem;margin-bottom:1rem;}
.modal p{font-size:12px;color:var(--text2);line-height:1.7;margin-bottom:1rem;}
.modal-actions{display:flex;gap:8px;margin-top:1.2rem;}

@media(max-width:680px){
  .main{flex-direction:column;}
  .sidebar{width:100%;border-right:none;border-bottom:1px solid var(--border);}
  .header{flex-direction:column;align-items:flex-start;}
}
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <h1>Marathon <em>Voies Royales</em><br>de Saint-Denis</h1>
    <p>Suivi adaptatif · 24 semaines · Objectif sub-3h30</p>
  </div>
  <div class="header-right">
    <div class="hstat">
      <div class="hstat-val" id="hKmDone">0</div>
      <div class="hstat-label">km complétés</div>
    </div>
    <div class="hstat">
      <div class="hstat-val" id="hSessionsDone">0</div>
      <div class="hstat-label">séances faites</div>
    </div>
    <div class="countdown">
      <div class="countdown-val" id="daysLeft">—</div>
      <div class="countdown-label">jours restants</div>
    </div>
  </div>
</header>

<div class="forme-bar" id="formBar">
  <span class="forme-label">Forme</span>
  <div class="forme-dots" id="formeDots"></div>
  <span class="forme-text" id="formeText">—</span>
  <div class="forme-sep"></div>
  <span class="progression-text" id="progressionText">Aucune séance enregistrée</span>
</div>

<nav class="tabs">
  <button class="tab active" onclick="showTab('overview',this)">Vue d'ensemble</button>
  <button class="tab" onclick="showTab('week',this)">Séances <span class="tab-badge" id="todoBadge" style="display:none">!</span></button>
  <button class="tab" onclick="showTab('zones',this)">Allures & zones</button>
  <button class="tab" onclick="showTab('phases',this)">Phases</button>
  <button class="tab" onclick="showTab('timeline',this)">Timeline</button>
</nav>

<div class="main">
<aside class="sidebar">
  <div class="sidebar-section">
    <div class="sidebar-heading">Phases</div>
    <div id="phaseNav"></div>
  </div>
  <div class="sidebar-section">
    <div class="sidebar-heading">Semaines</div>
    <div class="week-list" id="weekNav"></div>
  </div>
</aside>

<div class="content">
  <div class="panel active" id="panel-overview"><div id="overviewContent"></div></div>
  <div class="panel" id="panel-week"><div id="weekDetail"></div></div>
  <div class="panel" id="panel-zones"><div id="zonesContent"></div></div>
  <div class="panel" id="panel-phases"><div id="phaseDetail"></div></div>
  <div class="panel" id="panel-timeline"><div class="section-title">Timeline — 24 semaines</div><div class="timeline-wrap" id="timelineWrap"></div></div>
</div>
</div>

<!-- Adaptation modal -->
<div class="modal-overlay hidden" id="adaptModal">
  <div class="modal">
    <h3 id="adaptModalTitle">Adaptation du plan</h3>
    <p id="adaptModalText"></p>
    <div class="modal-actions">
      <button class="btn-save" onclick="applyAdaptation()">Appliquer</button>
      <button class="btn-cancel" onclick="closeAdaptModal()">Ignorer</button>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════
   DATA
═══════════════════════════════════════ */
const typeConfig = {
  ef:    {color:'#1D9E75',label:'Endurance fond.',bg:'rgba(29,158,117,0.15)'},
  am:    {color:'#378ADD',label:'Allure marathon',bg:'rgba(55,138,221,0.15)'},
  tempo: {color:'#6AAEE8',label:'Tempo run',      bg:'rgba(106,174,232,0.15)'},
  seuil: {color:'#EF9F27',label:'Seuil lactique', bg:'rgba(239,159,39,0.15)'},
  vma:   {color:'#7F77DD',label:'VMA / fractions',bg:'rgba(127,119,221,0.15)'},
  cotes: {color:'#E24B4A',label:'Côtes',           bg:'rgba(226,75,74,0.15)'},
  race:  {color:'#1D9E75',label:'MARATHON',        bg:'rgba(29,158,117,0.2)'},
};

const zones = [
  {id:'ef',label:'EF',name:'Endurance fondamentale',pace:"5'20\"–6'00\"/km",hr:'114–133 bpm',color:'#1D9E75',desc:"Base de tout l'entraînement. Conversation possible. Sert à récupérer et construire le volume.",usage:['Footings','Récupération','Sortie longue (début)']},

/* ═══════════════════════════════════════
   STORAGE  (localStorage — standalone file)
═══════════════════════════════════════ */
const STORE_KEY = 'marathon_vr_2026_v1';

function loadLogs() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY) || '{}'); }
  catch(e) { return {}; }
}
function saveLogs(logs) {
  localStorage.setItem(STORE_KEY, JSON.stringify(logs));
}
function getLogKey(pi, wi, si) { return `${pi}_${wi}_${si}`; }
function getLog(pi, wi, si) { return loadLogs()[getLogKey(pi,wi,si)] || null; }
function setLog(pi, wi, si, data) {
  const logs = loadLogs();
  logs[getLogKey(pi,wi,si)] = data;
  saveLogs(logs);
}
function clearLog(pi, wi, si) {
  const logs = loadLogs();
  delete logs[getLogKey(pi,wi,si)];
  saveLogs(logs);
}

/* ═══════════════════════════════════════
   ANALYTICS
═══════════════════════════════════════ */
function getAllSessions() {
  const out = [];
  phases.forEach((p,pi) => p.weeks.forEach((w,wi) => w.sessions.forEach((s,si) => {
    const log = getLog(pi,wi,si);
    out.push({pi,wi,si,p,w,s,log});
  })));
  return out;
}

function getStats() {
  const all = getAllSessions();
  const done = all.filter(x => x.log && x.log.status === 'done');
  const skipped = all.filter(x => x.log && x.log.status === 'skipped');
  const kmDone = done.reduce((acc,x) => acc + (x.log.kmActual || x.s.km), 0);
  const lastRessenti = done.filter(x => x.log.ressenti).slice(-5).map(x => x.log.ressenti);
  const avgRessenti = lastRessenti.length ? Math.round(lastRessenti.reduce((a,b)=>a+b,0)/lastRessenti.length*10)/10 : null;
  return {done:done.length, skipped:skipped.length, kmDone, avgRessenti, lastRessenti};
}

function getFormeScore() {
  const all = getAllSessions();
  const recent = all.filter(x => x.log && x.log.status === 'done').slice(-6);
  if(!recent.length) return null;
  const ressentis = recent.filter(x => x.log.ressenti).map(x => x.log.ressenti);
  if(!ressentis.length) return null;
  return ressentis.reduce((a,b)=>a+b,0)/ressentis.length;
}

function getPaceDelta(pi, wi, si) {
  const log = getLog(pi,wi,si);
  if(!log || !log.paceActual || !log.paceTarget) return null;
  const [m1,s1] = log.paceActual.split(':').map(Number);
  const [m2,s2] = log.paceTarget.split(':').map(Number);
  if(isNaN(m1)||isNaN(s1)||isNaN(m2)||isNaN(s2)) return null;
  return ((m1*60+s1) - (m2*60+s2));
}

function getAdaptationSuggestion() {
  const all = getAllSessions();
  const recent = all.filter(x => x.log && x.log.status === 'done').slice(-4);
  if(recent.length < 2) return null;
  const skippedCount = all.filter(x => x.log && x.log.status === 'skipped').slice(-6).length;
  const lowRessenti = recent.filter(x => x.log.ressenti && x.log.ressenti <= 2).length;
  const highRessenti = recent.filter(x => x.log.ressenti && x.log.ressenti >= 4).length;
  if(lowRessenti >= 2) return {type:'reduce', title:'Signe de fatigue détecté', text:`<strong>${lowRessenti} séances difficiles</strong> sur les 4 dernières. Je suggère de réduire le volume de la prochaine semaine de 15% et de convertir la séance intensive en footing EF.`};
  if(skippedCount >= 3) return {type:'catch_up', title:'Plusieurs séances manquées', text:`<strong>${skippedCount} séances sautées</strong> récemment. Inutile de rattraper le volume manqué — continuez le plan normalement, les adaptations physiologiques restent acquises.`};
  if(highRessenti >= 3) return {type:'progress', title:'Excellente forme !', text:`<strong>${highRessenti} séances très bien ressenties</strong> consécutives. Tu peux envisager d'ajouter 5–8% de volume sur la prochaine semaine ou d'augmenter légèrement l'intensité des séances seuil.`};
  return null;
}

function showTab(id, btn) {
  activeTab = id;
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

  if(id==='overview') renderOverview();
  if(id==='week') renderWeekDetail(activeWeek.phase, activeWeek.week);

   SIDEBAR
═══════════════════════════════════════ */
function buildSidebar() {
  const pNav = document.getElementById('phaseNav');
  pNav.innerHTML = '';
  phases.forEach((p,pi) => {
    const el = document.createElement('div');
    el.className = 'phase-item'+(pi===0?' active':'');
    el.style.setProperty('--phase-color', p.color);
    el.innerHTML = `<div class="phase-dot"></div><div><div class="phase-name">${p.label}</div><div class="phase-weeks">Sem. ${p.weeks_range} · ${p.months}</div></div>`;
    el.onclick = () => {
      activePhase = pi;
      activeWeek = {phase:pi,week:0};
      document.querySelectorAll('.phase-item').forEach(e => e.classList.remove('active'));
      el.classList.add('active');
      buildWeekNav(pi);
      if(activeTab==='phases') renderPhaseDetail(pi);
      if(activeTab==='week') renderWeekDetail(pi,0);
    };
    pNav.appendChild(el);
  });
  buildWeekNav(0);
}

function buildWeekNav(pi) {
  const wNav = document.getElementById('weekNav');
  wNav.innerHTML = '';
  phases[pi].weeks.forEach((w,wi) => {
    const logs = loadLogs();
    const sessions = w.sessions;
    const doneCount = sessions.filter((_,si) => {
      const l = logs[getLogKey(pi,wi,si)];
      return l && l.status==='done';
    }).length;
    const allDone = doneCount === sessions.length;
    const partial = doneCount > 0 && !allDone;
    const el = document.createElement('div');
    el.className = 'week-item'+(wi===activeWeek.week&&pi===activeWeek.phase?' active':'');
    el.style.setProperty('--phase-color', phases[pi].color);
    let dotColor = 'transparent';
    if(allDone) dotColor = '#1D9E75';
    else if(partial) dotColor = '#EF9F27';
    el.innerHTML = `<span class="week-num-label">S${w.n}</span><span class="week-item-title">${w.title}</span><div class="week-status-dot" style="background:${dotColor}"></div>${w.highlight?'<div class="week-highlight-dot"></div>':''}`;
    el.onclick = () => {
      activeWeek = {phase:pi,week:wi};
      document.querySelectorAll('.week-item').forEach(e => e.classList.remove('active'));
      el.classList.add('active');
      const tabBtn = document.querySelector('.tabs .tab:nth-child(2)');
      showTab('week', tabBtn);
    };
    wNav.appendChild(el);
  });
}

function updateFormBar() {
  const score = getFormeScore();
  const stats = getStats();
  const dots = document.getElementById('formeDots');
  const text = document.getElementById('formeText');
  const prog = document.getElementById('progressionText');
  dots.innerHTML = '';
  for(let i=1;i<=5;i++) {
    const d = document.createElement('div');
    d.className = 'forme-dot';
    if(score !== null && i <= Math.round(score)) {
      if(score <= 2) d.classList.add('active-red');
      else if(score <= 3) d.classList.add('active-amber');
      else d.classList.add('active-teal');
    }
    dots.appendChild(d);
  }
  if(score === null) { text.textContent = 'En attente de données'; }
  else if(score <= 2) { text.textContent = 'Fatigue — penser à récupérer'; }
  else if(score <= 3) { text.textContent = 'Forme correcte'; }
  else if(score <= 4) { text.textContent = 'Bonne forme'; }
  else { text.textContent = 'Excellente forme !'; }

  document.getElementById('hKmDone').textContent = stats.kmDone;
  document.getElementById('hSessionsDone').textContent = stats.done;
  prog.innerHTML = stats.done===0 ? 'Aucune séance enregistrée' :
    `<strong>${stats.done} séances</strong> · <strong>${stats.kmDone} km</strong> complétés`;
}

    <div style="display:flex;gap:10px;margin-top:1.2rem;flex-wrap:wrap;">
      ${wi>0 ? `<button onclick="navigateWeek(${pi},${wi-1})" style="padding:6px 14px;font-size:11px;font-family:var(--font-mono);border:1px solid var(--border2);background:transparent;color:var(--text2);border-radius:6px;cursor:pointer;">← S${w.n-1}</button>` : ''}
      ${wi<p.weeks.length-1 ? `<button onclick="navigateWeek(${pi},${wi+1})" style="padding:6px 14px;font-size:11px;font-family:var(--font-mono);border:1px solid var(--border2);background:transparent;color:var(--text2);border-radius:6px;cursor:pointer;">S${w.n+1} →</button>` : ''}
      ${pi<phases.length-1&&wi===p.weeks.length-1 ? `<button onclick="navigateWeek(${pi+1},0)" style="padding:6px 14px;font-size:11px;font-family:var(--font-mono);border:1px solid var(--border2);background:transparent;color:var(--text2);border-radius:6px;cursor:pointer;">Phase suivante →</button>` : ''}
    </div>
  `;
}

function getWeekAdaptation(pi, wi) {
  if(wi===0) return null;
  const prevLogs = [];
  phases[pi].weeks[wi-1].sessions.forEach((_,si) => {
    const l = getLog(pi,wi-1,si);
    if(l && l.status==='done' && l.ressenti) prevLogs.push(l.ressenti);
  });
  if(prevLogs.length < 2) return null;
  const avg = prevLogs.reduce((a,b)=>a+b,0)/prevLogs.length;
  if(avg <= 1.8) return {title:'Semaine allégée recommandée',text:`La semaine précédente a été très difficile (ressenti moyen ${avg.toFixed(1)}/5). Les séances EF sont réduites de 20% pour favoriser la récupération.`,adjustedKm:{factor:0.8}};
  if(avg >= 4.5) return {title:'Charge légèrement augmentée',text:`Excellente semaine précédente (ressenti ${avg.toFixed(1)}/5). Les footings EF gagnent 5% de volume pour profiter de ta forme.`,adjustedKm:{factor:1.05}};
  return null;
}

/* ═══════════════════════════════════════
   LOG ACTIONS
═══════════════════════════════════════ */
let ressentiValues = {};

function setRessenti(formKey, val) {
  ressentiValues[formKey] = parseInt(val);
  document.querySelectorAll(`#ressenti_${formKey} .ressenti-btn`).forEach((btn,i) => {
    btn.className = 'ressenti-btn';
    if(i+1 === parseInt(val)) btn.classList.add('selected-'+val);
  });
}

function openForm(formKey) {
  openForms[formKey] = true;
  const f = document.getElementById('form_'+formKey);
  if(f) f.classList.add('open');
}

function closeForm(formKey) {
  openForms[formKey] = false;
  const f = document.getElementById('form_'+formKey);
  if(f) f.classList.remove('open');
}

function saveLog(pi, wi, si, status) {
  const formKey = getLogKey(pi,wi,si);
  if(status === 'done') {
    const kmEl = document.getElementById('km_'+formKey);
    const paceEl = document.getElementById('pace_'+formKey);
    const fcEl = document.getElementById('fc_'+formKey);
    const commentEl = document.getElementById('comment_'+formKey);
    const s = phases[pi].weeks[wi].sessions[si];
    const data = {
      status:'done',
      kmActual: kmEl && kmEl.value ? parseFloat(kmEl.value) : s.km,
      paceActual: paceEl && paceEl.value ? paceEl.value.trim() : null,
      paceTarget: getPaceTargetFromDetail(s.detail),
      fcActual: fcEl && fcEl.value ? parseInt(fcEl.value) : null,
      ressenti: ressentiValues[formKey] || null,
      comment: commentEl && commentEl.value ? commentEl.value.trim() : null,
      ts: Date.now(),
    };
    setLog(pi,wi,si,data);
    openForms[formKey] = false;
  } else {
    const formKey2 = getLogKey(pi,wi,si);
    const commentEl = document.getElementById('comment_'+formKey2);
    setLog(pi,wi,si,{status:'skipped',comment:commentEl&&commentEl.value?commentEl.value.trim():null,ts:Date.now()});
    openForms[formKey2] = false;
  }
  delete ressentiValues[formKey];
  refresh();
  checkAdaptation(pi,wi,si);
}

function clearLogEntry(pi, wi, si) {
  clearLog(pi,wi,si);
  delete ressentiValues[getLogKey(pi,wi,si)];
  refresh();
}

function getPaceTargetFromDetail(detail) {
  const allure = detail.allure || '';
  const m = allure.match(/(\d+)'(\d+)/);
  if(!m) return null;
  return `${m[1]}:${m[2]}`;
}

function deltaBadge(pi, wi, si) {
  const d = getPaceDelta(pi,wi,si);
  if(d===null) return '';
  if(Math.abs(d)<5) return '';
  const sign = d>0 ? '+' : '';
  const cls = d>15 ? 'delta-neg' : d<-10 ? 'delta-pos' : 'delta-neg';
  return `<span class="delta-badge ${cls}">${sign}${d}s</span>`;
}

function checkAdaptation(pi, wi, si) {
  const sugg = getAdaptationSuggestion();
  if(sugg) {
    pendingAdaptation = sugg;
    document.getElementById('adaptModalTitle').textContent = sugg.title;
    document.getElementById('adaptModalText').innerHTML = sugg.text + '<br><br>Veux-tu que j\'applique cette adaptation automatiquement ?';
    document.getElementById('adaptModal').classList.remove('hidden');
  }
}

function applyAdaptation() {
  closeAdaptModal();
  refresh();
}

function closeAdaptModal() {
  document.getElementById('adaptModal').classList.add('hidden');
  pendingAdaptation = null;
}

function navigateWeek(pi, wi) {
  activeWeek = {phase:pi,week:wi};
  if(pi!==activePhase) {
    activePhase = pi;
    buildWeekNav(pi);
    document.querySelectorAll('.phase-item').forEach((e,i) => { e.classList.toggle('active',i===pi); e.style.setProperty('--phase-color',phases[pi].color); });
  }
  document.querySelectorAll('.week-item').forEach((e,i) => { e.classList.toggle('active',i===wi); });
  renderWeekDetail(pi,wi);
}

/* ═══════════════════════════════════════
   ZONES
═══════════════════════════════════════ */

      <div class="target-item"><div class="tlabel">Objectif chrono</div><div class="tval">3h29'59"</div><div class="tsub">sub-3h30</div></div>
      <div class="tdivider"></div>
      <div class="target-item"><div class="tlabel">Allure cible</div><div class="tval">4'58"/km</div><div class="tsub">± 5 sec</div></div>
      <div class="tdivider"></div>
      <div class="target-item"><div class="tlabel">FC marathon 2024</div><div class="tval">170 bpm</div><div class="tsub">FCmax ~190 bpm</div></div>
      <div class="tdivider"></div>
      <div class="target-item"><div class="tlabel">VMA estimée</div><div class="tval">17–17.5</div><div class="tsub">km/h</div></div>
    </div>
    <div class="section-title">Zones d'entraînement</div>
    <div class="zones-grid">${zones.map(z=>`
      <div class="zone-card" style="--zone-color:${z.color}">
        <div class="zone-label">${z.label}</div>
        <div class="zone-name">${z.name}</div>

    <div class="section-title">Garmin Fenix 5 — zones FC</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;">
      ${[['1','Récupération','< 114 bpm','#666'],['2','Endurance fond.','114–133 bpm','#1D9E75'],['3','Aérobie modéré','133–152 bpm','#378ADD'],['4','Seuil lactique','152–171 bpm','#EF9F27'],['5','VO2max / VMA','171–190 bpm','#E24B4A']].map(([z,n,hr,c])=>`
      <div class="zone-card" style="--zone-color:${c}">

/* ═══════════════════════════════════════
   PHASE DETAIL
═══════════════════════════════════════ */
function renderPhaseDetail(pi) {
  const p = phases[pi];
  const el = document.getElementById('phaseDetail');
  const maxVol = 75;
  el.innerHTML = `
    <div class="section-title" style="color:${p.color}">${p.label} · Semaines ${p.weeks_range} · ${p.months}</div>
    <div class="phase-desc-box">${p.desc}</div>
    <div class="phase-stat-grid">
      <div class="phase-stat"><div class="phase-stat-label">Volume</div><div class="phase-stat-val" style="color:${p.color}">${p.vol_min}–${p.vol_max} km/sem</div></div>
      <div class="phase-stat"><div class="phase-stat-label">Durée</div><div class="phase-stat-val" style="color:${p.color}">${p.weeks.length} semaines</div></div>
    </div>
    <div class="section-title">Points clés</div>
    <div class="phase-desc-box">${p.focus.map(f=>`<div class="focus-item"><span style="color:${p.color}">›</span><span>${f}</span></div>`).join('')}</div>
    <div class="section-title">Volume semaine par semaine</div>
    <div style="display:flex;flex-direction:column;gap:8px;">
      ${p.weeks.map((w,wi) => {
        const logs = loadLogs();
        const doneCount = w.sessions.filter((_,si) => { const l = logs[getLogKey(pi,wi,si)]; return l&&l.status==='done'; }).length;
        const pct2 = Math.round(w.vol/maxVol*100);
        const statusDot = doneCount===w.sessions.length ? `<span style="color:var(--teal)">✓</span>` : doneCount>0 ? `<span style="color:var(--amber)">◑</span>` : '';
        return `<div style="display:flex;align-items:center;gap:12px;cursor:pointer;" onclick="goToSession(${pi},${wi})">
          <span style="font-size:11px;color:var(--text3);min-width:30px;">S${w.n}</span>
          <div style="flex:1;height:20px;background:var(--surface2);border-radius:4px;overflow:hidden;position:relative;">
            <div style="height:100%;width:${pct2}%;background:${p.color};opacity:.6;border-radius:4px;"></div>
            <span style="position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--text2);">${w.title}</span>
          </div>
          <span style="font-size:12px;font-weight:500;color:${p.color};min-width:44px;text-align:right;">${w.vol} km</span>
          <span style="width:16px;text-align:center;font-size:12px;">${statusDot}</span>
          ${w.highlight?`<span style="width:6px;height:6px;border-radius:50%;background:var(--amber);flex-shrink:0;"></span>`:'<span style="width:6px;"></span>'}
        </div>`;
      }).join('')}
    </div>
  `;
}

/* ═══════════════════════════════════════
   TIMELINE
═══════════════════════════════════════ */
function renderTimeline() {
  const wrap = document.getElementById('timelineWrap');
  const W=860, H=320, padL=50, padR=20, padT=30, padB=40;
  const allWeeks = phases.flatMap(p=>p.weeks);
  const maxVol=75;
  const xStep=(W-padL-padR)/(allWeeks.length-1);
  const yScale=h=>padT+(1-h/maxVol)*(H-padT-padB);
  const phaseColors=['#1D9E75','#378ADD','#7F77DD','#EF9F27'];

  let path=`M ${padL} ${yScale(allWeeks[0].vol)}`;
  allWeeks.forEach((w,i)=>{ if(i>0) path+=` L ${padL+i*xStep} ${yScale(w.vol)}`; });

  let phaseRects='', xi=0;
  phases.forEach((p,pi)=>{
    const x1=padL+xi*xStep-(xi===0?0:xStep/2);
    const x2=padL+(xi+p.weeks.length-1)*xStep+xStep/2;
    phaseRects+=`<rect x="${x1}" y="${padT}" width="${x2-x1}" height="${H-padT-padB}" fill="${phaseColors[pi]}" opacity=".06" rx="4"/>`;
    phaseRects+=`<text x="${(x1+x2)/2}" y="${padT-8}" text-anchor="middle" font-size="10" fill="${phaseColors[pi]}" font-family="DM Mono,monospace" letter-spacing="1">${p.label.toUpperCase()}</text>`;
    xi+=p.weeks.length;
  });

  let dots='', labels='', wi2=0;
  phases.forEach((p,pi)=>{
    p.weeks.forEach((w,wi)=>{
      const x=padL+wi2*xStep;
      const y=yScale(w.vol);
      const log = loadLogs();
      const doneCount = w.sessions.filter((_,si)=>{ const l=log[getLogKey(pi,wi,si)]; return l&&l.status==='done'; }).length;
      const dotColor = doneCount===w.sessions.length ? '#1D9E75' : doneCount>0 ? '#EF9F27' : phaseColors[pi];
      const dotOpacity = doneCount>0 ? 1 : 0.6;
      dots+=`<circle cx="${x}" cy="${y}" r="${w.highlight?5:3}" fill="${dotColor}" opacity="${dotOpacity}" style="cursor:pointer" onclick="goToSession(${pi},${wi})"/>`;
      if(w.highlight) dots+=`<circle cx="${x}" cy="${y}" r="9" fill="none" stroke="${phaseColors[pi]}" stroke-width="1" opacity=".5"/>`;
      if(wi2%4===0||w.n===24) labels+=`<text x="${x}" y="${H-padB+16}" text-anchor="middle" font-size="9" fill="#504e48" font-family="DM Mono,monospace">S${w.n}</text>`;
      wi2++;
    });
  });

  let grid='';
  [20,40,60,75].forEach(v=>{
    const y=yScale(v);
    grid+=`<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="#252522" stroke-width="1"/>`;
    grid+=`<text x="${padL-6}" y="${y+4}" text-anchor="end" font-size="9" fill="#504e48" font-family="DM Mono,monospace">${v}</text>`;
  });

  wrap.innerHTML = `
    <div style="font-size:10px;color:var(--text3);margin-bottom:.5rem;letter-spacing:.08em;">Volume hebdomadaire — cliquer sur un point pour ouvrir la semaine · <span style="color:var(--teal)">●</span> complétée · <span style="color:var(--amber)">●</span> partielle</div>
    <svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="max-width:100%;display:block;">
      ${grid}${phaseRects}
      <path d="${path}" fill="none" stroke="#378ADD" stroke-width="1.5" opacity=".3"/>
      ${dots}${labels}
    </svg>
  `;
}

/* ═══════════════════════════════════════
   REFRESH + INIT
═══════════════════════════════════════ */
function refresh() {
  updateFormBar();
  buildWeekNav(activeWeek.phase);
  if(activeTab==='overview') renderOverview();
  if(activeTab==='week') renderWeekDetail(activeWeek.phase,activeWeek.week);
  if(activeTab==='phases') renderPhaseDetail(activePhase);
  if(activeTab==='timeline') renderTimeline();
}

function updateCountdown() {
  const race = new Date('2026-10-26T08:00:00');
  const now = new Date();
  const d = Math.ceil((race-now)/86400000);
  document.getElementById('daysLeft').textContent = d>0?d:'0';
}

buildSidebar();
renderZones();
renderOverview();
updateCountdown();
updateFormBar();
</script>

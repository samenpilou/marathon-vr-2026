<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Dashboard Marathon</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;1,9..144,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0e0e0c; --surface:#161614; --surface2:#1e1e1b; --surface3:#252522;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.12); --border3:rgba(255,255,255,0.2);
  --text:#e8e6df; --text2:#908e85; --text3:#504e48;
  --teal:#1D9E75; --teal-light:#4ABFA0; --teal-dim:rgba(29,158,117,0.12);
  --blue:#378ADD; --blue-light:#6AAEE8; --blue-dim:rgba(55,138,221,0.12);
  --purple:#7F77DD; --purple-dim:rgba(127,119,221,0.12);
  --amber:#EF9F27; --amber-light:#F5BC65; --amber-dim:rgba(239,159,39,0.12);
  --red:#E24B4A; --red-dim:rgba(226,75,74,0.12);
  --font-display:'Fraunces',Georgia,serif; --font-mono:'DM Mono','Courier New',monospace;
  --bottom-bar-h: 60px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font-mono);font-size:13px;line-height:1.6;min-height:100vh;}

/* ── HEADER ── */
.header{padding:1.2rem 2rem 1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:1rem;}
.header-left{display:flex;align-items:center;gap:12px;}
.hamburger{display:none;background:none;border:none;cursor:pointer;padding:6px;color:var(--text2);}
.hamburger svg{display:block;}
.header-title h1{font-family:var(--font-display);font-weight:300;font-size:1.5rem;line-height:1.1;letter-spacing:-0.02em;}
.header-title h1 em{font-style:italic;color:var(--teal-light);}
.header-title p{color:var(--text2);font-size:10px;letter-spacing:.08em;text-transform:uppercase;margin-top:2px;}
.header-right{display:flex;gap:1rem;align-items:center;}
.hstat{text-align:right;}
.hstat-val{font-family:var(--font-display);font-weight:300;font-size:1.3rem;line-height:1;}
.hstat-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;}
.countdown{background:var(--teal-dim);border:1px solid rgba(29,158,117,0.3);border-radius:6px;padding:6px 12px;text-align:center;}
.countdown-val{font-family:var(--font-display);font-size:1.5rem;font-weight:300;color:var(--teal-light);line-height:1;}
.countdown-label{font-size:9px;color:var(--teal);text-transform:uppercase;letter-spacing:.1em;}
.btn-settings{background:none;border:1px solid var(--border2);border-radius:6px;padding:6px 8px;cursor:pointer;color:var(--text3);transition:all .15s;}
.btn-settings:hover{color:var(--text);border-color:var(--border3);}

/* ── FORME BAR ── */
.forme-bar{padding:.5rem 2rem;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:1.2rem;flex-wrap:wrap;}
.forme-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;}
.forme-dots{display:flex;gap:5px;}
.forme-dot{width:24px;height:5px;border-radius:3px;background:var(--surface3);}
.forme-dot.active-teal{background:var(--teal);}
.forme-dot.active-amber{background:var(--amber);}
.forme-dot.active-red{background:var(--red);}
.forme-text{font-size:11px;color:var(--text2);}
.forme-sep{width:1px;height:14px;background:var(--border);}
.progression-text{font-size:11px;color:var(--text2);}
.progression-text strong{color:var(--teal-light);}
.program-badge{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--teal-dim);color:var(--teal);border:1px solid rgba(29,158,117,0.2);}
.program-badge.archived{background:var(--surface2);color:var(--text3);border-color:var(--border);}

/* ── DESKTOP TABS ── */
.tabs{display:flex;border-bottom:1px solid var(--border);padding:0 2rem;}
.tab{padding:10px 16px;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;font-family:var(--font-mono);background:none;border-top:none;border-left:none;border-right:none;}
.tab:hover{color:var(--text2);}
.tab.active{color:var(--text);border-bottom-color:var(--teal);}

/* ── LAYOUT ── */
.main{display:flex;min-height:calc(100vh - 140px);}
.sidebar{width:210px;flex-shrink:0;border-right:1px solid var(--border);padding:1.2rem 0;}
.content{flex:1;padding:1.5rem 2rem;overflow-x:hidden;}
.panel{display:none;}
.panel.active{display:block;}

/* ── SIDEBAR ── */
.sidebar-heading{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);padding:0 1.2rem;margin-bottom:.4rem;}
.sidebar-section{margin-bottom:1.2rem;}
.phase-item{display:flex;align-items:center;gap:10px;padding:7px 1.2rem;cursor:pointer;transition:background .15s;border-left:2px solid transparent;}
.phase-item:hover{background:var(--surface2);}
.phase-item.active{background:var(--surface2);border-left-color:var(--phase-color);}
.phase-dot{width:7px;height:7px;border-radius:50%;background:var(--phase-color);flex-shrink:0;}
.phase-name{font-size:11px;color:var(--text2);}
.phase-item.active .phase-name{color:var(--text);}
.phase-weeks{font-size:10px;color:var(--text3);}
.week-list{max-height:400px;overflow-y:auto;scrollbar-width:none;}
.week-list::-webkit-scrollbar{display:none;}
.week-item{display:flex;align-items:center;gap:8px;padding:5px 1.2rem;cursor:pointer;transition:background .15s;border-left:2px solid transparent;}
.week-item:hover{background:var(--surface2);}
.week-item.active{background:var(--surface2);border-left-color:var(--phase-color,var(--teal));}
.week-num-label{font-size:10px;color:var(--text3);min-width:20px;}
.week-item-title{font-size:11px;color:var(--text2);flex:1;}
.week-item.active .week-item-title{color:var(--text);}
.week-status-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.week-highlight-dot{width:5px;height:5px;border-radius:50%;background:var(--amber);flex-shrink:0;}

/* ── MOBILE DRAWER ── */
.drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:80;opacity:0;transition:opacity .25s;}
.drawer-overlay.open{opacity:1;}
.drawer{position:fixed;top:0;left:0;bottom:0;width:260px;background:var(--surface);border-right:1px solid var(--border2);z-index:90;transform:translateX(-100%);transition:transform .25s ease;padding:1rem 0;overflow-y:auto;}
.drawer.open{transform:translateX(0);}
.drawer-header{display:flex;align-items:center;justify-content:space-between;padding:.8rem 1.2rem 1rem;border-bottom:1px solid var(--border);}
.drawer-title{font-family:var(--font-display);font-size:1rem;font-weight:300;color:var(--text);}
.btn-close-drawer{background:none;border:none;cursor:pointer;color:var(--text3);padding:4px;}

/* ── BOTTOM NAV (mobile) ── */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:var(--bottom-bar-h);background:var(--surface);border-top:1px solid var(--border2);z-index:70;padding:0 env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);}
.bottom-nav-inner{display:flex;height:100%;}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--text3);transition:color .15s;border:none;background:none;font-family:var(--font-mono);}
.bnav-item.active{color:var(--teal);}
.bnav-item svg{width:20px;height:20px;}
.bnav-label{font-size:9px;letter-spacing:.04em;text-transform:uppercase;}

/* ── SECTION TITLE ── */
.section-title{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:1rem;padding-bottom:6px;border-bottom:1px solid var(--border);}

/* ── STAT CARDS ── */
.overview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:1.5rem;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.9rem 1rem;}
.stat-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;}
.stat-val{font-family:var(--font-display);font-size:1.4rem;font-weight:300;}
.stat-sub{font-size:11px;color:var(--text2);margin-top:2px;}

/* ── ADAPT BANNER ── */
.adapt-banner{background:var(--amber-dim);border:1px solid rgba(239,159,39,0.35);border-radius:8px;padding:10px 14px;margin-bottom:1.2rem;display:flex;gap:10px;align-items:flex-start;}
.adapt-icon{font-size:14px;flex-shrink:0;margin-top:1px;}
.adapt-text{font-size:12px;color:var(--amber-light);line-height:1.6;}
.adapt-text strong{color:var(--amber);}

/* ── SESSION CARDS ── */
.sessions-list{display:flex;flex-direction:column;gap:10px;}
.session-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1rem 1.2rem;position:relative;overflow:hidden;transition:border-color .2s;}
.session-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--s-color);}
.session-card:hover{border-color:var(--border2);}
.session-card.done{opacity:.75;}
.session-card.done::after{content:'✓';position:absolute;top:10px;right:14px;font-size:16px;color:var(--teal);}
.session-card.skipped::after{content:'—';position:absolute;top:10px;right:14px;font-size:16px;color:var(--text3);}
.session-card.readonly{pointer-events:none;opacity:.6;}
.session-top{display:flex;gap:1rem;align-items:flex-start;}
.session-day-badge{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);min-width:26px;padding-top:2px;}
.session-body{flex:1;}
.session-name{font-size:13px;color:var(--text);margin-bottom:5px;}
.session-type-badge{display:inline-block;font-size:9px;padding:2px 8px;border-radius:10px;letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;}
.session-details{display:flex;flex-wrap:wrap;gap:6px;}
.sdet{background:var(--surface2);border-radius:4px;padding:3px 7px;font-size:11px;}
.sdet-label{color:var(--text3);}
.sdet-val{color:var(--text2);}
.session-dist-badge{font-family:var(--font-display);font-size:1.2rem;font-weight:300;color:var(--text2);min-width:44px;text-align:right;padding-top:2px;}
.session-dist-badge span{font-size:10px;color:var(--text3);}
.session-note{margin-top:5px;font-size:11px;color:var(--text3);font-style:italic;}

/* ── LOG FORM ── */
.log-toggle{margin-top:10px;display:flex;gap:8px;align-items:center;}
.btn-log{padding:4px 11px;font-size:11px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-family:var(--font-mono);transition:all .15s;}
.btn-log:hover{background:var(--surface2);color:var(--text);}
.btn-log.done-btn{border-color:rgba(29,158,117,0.4);color:var(--teal);}
.btn-log.skip-btn{border-color:var(--border);color:var(--text3);}
.btn-log.edit-btn{border-color:rgba(239,159,39,0.3);color:var(--amber);}
.log-form{margin-top:10px;background:var(--surface2);border-radius:8px;padding:12px;display:none;}
.log-form.open{display:block;}
.log-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
.log-field{display:flex;flex-direction:column;gap:3px;flex:1;min-width:90px;}
.log-field label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;}
.log-field input,.log-field textarea{background:var(--surface3);border:1px solid var(--border2);border-radius:4px;padding:4px 7px;color:var(--text);font-family:var(--font-mono);font-size:12px;outline:none;}
.log-field input:focus,.log-field textarea:focus{border-color:var(--teal);}
.log-field textarea{resize:vertical;min-height:46px;}
.ressenti-row{display:flex;gap:5px;margin-bottom:8px;}
.ressenti-btn{flex:1;padding:5px 2px;border:1px solid var(--border);background:transparent;border-radius:6px;font-size:11px;color:var(--text3);cursor:pointer;font-family:var(--font-mono);transition:all .15s;text-align:center;}
.ressenti-btn.selected-1{border-color:var(--red);color:var(--red);background:var(--red-dim);}
.ressenti-btn.selected-2{border-color:var(--amber);color:var(--amber);background:var(--amber-dim);}
.ressenti-btn.selected-3{border-color:var(--teal);color:var(--teal);background:var(--teal-dim);}
.ressenti-btn.selected-4{border-color:var(--blue);color:var(--blue);background:var(--blue-dim);}
.ressenti-btn.selected-5{border-color:var(--purple);color:var(--purple);background:var(--purple-dim);}
.log-actions{display:flex;gap:7px;}
.btn-save{padding:5px 14px;background:var(--teal);color:#fff;border:none;border-radius:6px;font-size:12px;font-family:var(--font-mono);cursor:pointer;}
.btn-save:hover{background:var(--teal-light);}
.btn-cancel-sm{padding:5px 10px;background:transparent;color:var(--text3);border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:var(--font-mono);cursor:pointer;}
.log-result{margin-top:8px;background:var(--surface2);border-radius:6px;padding:7px 10px;border-left:2px solid var(--teal);}
.log-result.skipped-result{border-left-color:var(--text3);}
.log-result-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:3px;}
.log-res-item{font-size:11px;}
.log-res-label{color:var(--text3);}
.log-res-val{color:var(--text2);}
.log-res-comment{font-size:11px;color:var(--text3);font-style:italic;margin-top:2px;}
.delta-badge{display:inline-block;font-size:10px;padding:1px 5px;border-radius:8px;margin-left:4px;}
.delta-pos{background:var(--teal-dim);color:var(--teal);}
.delta-neg{background:var(--red-dim);color:var(--red);}

/* ── WEEK HEADER ── */
.week-header-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px;}
.week-title-display{font-family:var(--font-display);font-size:1.3rem;font-weight:300;}
.week-vol-display{font-family:var(--font-display);font-size:1.6rem;font-weight:300;}
.vol-bar-outer{height:3px;background:var(--surface3);border-radius:2px;margin-bottom:1.2rem;}
.vol-bar-inner{height:3px;border-radius:2px;transition:width .4s;}

/* ── ZONES ── */
.zones-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px;margin-bottom:2rem;}
.zone-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.9rem 1rem;position:relative;overflow:hidden;}
.zone-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--zone-color);}
.zone-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:.3rem;}
.zone-name{font-family:var(--font-display);font-size:1rem;font-weight:300;color:var(--text);margin-bottom:.25rem;}
.zone-pace{font-size:1.2rem;font-family:var(--font-display);font-weight:300;color:var(--zone-color);line-height:1;}
.zone-hr{font-size:11px;color:var(--text2);margin-top:3px;}
.zone-desc{font-size:11px;color:var(--text3);margin-top:6px;line-height:1.5;}
.zone-badges{display:flex;flex-wrap:wrap;gap:3px;margin-top:6px;}
.zbadge{font-size:9px;padding:2px 6px;border-radius:8px;background:rgba(255,255,255,0.05);color:var(--text3);}

/* ── TARGET BAR ── */
.marathon-target{background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:1rem 1.2rem;margin-bottom:1.5rem;display:flex;gap:1.5rem;align-items:center;flex-wrap:wrap;}
.target-item .tlabel{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px;}
.target-item .tval{font-family:var(--font-display);font-size:1.3rem;font-weight:300;color:var(--teal-light);}
.target-item .tsub{font-size:11px;color:var(--text2);}
.tdivider{width:1px;height:36px;background:var(--border);}

/* ── PHASE DETAIL ── */
.phase-desc-box{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.9rem 1rem;margin-bottom:1rem;color:var(--text2);font-size:12px;line-height:1.7;}
.phase-stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem;}
.phase-stat{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.8rem 1rem;}
.phase-stat-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px;}
.phase-stat-val{font-family:var(--font-display);font-size:1.2rem;font-weight:300;}
.focus-item{display:flex;gap:7px;padding:2px 0;font-size:11px;color:var(--text2);}

/* ── TIMELINE ── */
.timeline-wrap{overflow-x:auto;padding-bottom:1rem;}

/* ── MODAL OVERLAY ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;display:flex;align-items:center;justify-content:center;padding:1.5rem;}
.modal-overlay.hidden{display:none;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:0;max-width:560px;width:100%;max-height:90vh;display:flex;flex-direction:column;}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:1.2rem 1.5rem;border-bottom:1px solid var(--border);}
.modal-title{font-family:var(--font-display);font-weight:300;font-size:1.2rem;}
.btn-close-modal{background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px;line-height:1;}
.modal-tabs{display:flex;border-bottom:1px solid var(--border);padding:0 1.5rem;}
.modal-tab{padding:9px 14px;font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--font-mono);transition:all .2s;}
.modal-tab.active{color:var(--text);border-bottom-color:var(--teal);}
.modal-body{padding:1.2rem 1.5rem;overflow-y:auto;flex:1;}
.modal-footer{padding:1rem 1.5rem;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;}

/* ── SETTINGS PANELS ── */
.settings-panel{display:none;}
.settings-panel.active{display:block;}
.import-textarea{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:8px 10px;color:var(--text);font-family:var(--font-mono);font-size:11px;min-height:140px;resize:vertical;outline:none;margin-bottom:10px;}
.import-textarea:focus{border-color:var(--teal);}
.import-error{background:var(--red-dim);border:1px solid rgba(226,75,74,0.3);border-radius:6px;padding:8px 12px;font-size:12px;color:var(--red);margin-bottom:10px;display:none;}
.import-success{background:var(--teal-dim);border:1px solid rgba(29,158,117,0.3);border-radius:6px;padding:8px 12px;font-size:12px;color:var(--teal);margin-bottom:10px;display:none;}
.btn-primary{padding:6px 16px;background:var(--teal);color:#fff;border:none;border-radius:6px;font-size:12px;font-family:var(--font-mono);cursor:pointer;}
.btn-primary:hover{background:var(--teal-light);}
.btn-secondary{padding:6px 14px;background:transparent;color:var(--text2);border:1px solid var(--border2);border-radius:6px;font-size:12px;font-family:var(--font-mono);cursor:pointer;}
.btn-secondary:hover{background:var(--surface2);}
.btn-danger{padding:6px 14px;background:transparent;color:var(--red);border:1px solid rgba(226,75,74,0.3);border-radius:6px;font-size:12px;font-family:var(--font-mono);cursor:pointer;}
.btn-danger:hover{background:var(--red-dim);}

/* Programs list */
.program-list{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem;}
.program-row{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:.8rem 1rem;display:flex;align-items:center;gap:10px;}
.program-row.is-active{border-color:rgba(29,158,117,0.35);}
.program-row-info{flex:1;}
.program-row-name{font-size:13px;color:var(--text);}
.program-row-meta{font-size:11px;color:var(--text3);margin-top:2px;}
.program-row-badge{font-size:10px;padding:2px 8px;border-radius:8px;}
.badge-active{background:var(--teal-dim);color:var(--teal);}
.badge-archived{background:var(--surface3);color:var(--text3);}
.program-row-actions{display:flex;gap:6px;}

/* New program form */
.new-program-form{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:1rem;margin-top:1rem;}
.form-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
.form-field{display:flex;flex-direction:column;gap:3px;flex:1;min-width:120px;}
.form-field label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;}
.form-field input,.
